<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <meta name="description" content="Linux、Windows、开发与授权安全测试命令的只读查询工具">
    <title>命令查询库</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛠️%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="./styles.css">
    <script src="./app.js" defer></script>
</head>
<body>
    <div class="page-shell">
        <header class="hero">
            <div>
                <p class="eyebrow">PUBLIC COMMAND LIBRARY</p>
                <h1>命令查询库</h1>
                <p class="hero-copy">只读浏览、搜索和复制常用命令。本站不会请求账号、密码或 GitHub Token。</p>
            </div>
            <div class="hero-actions">
                <span class="readonly-badge">🔒 公开只读</span>
                <button class="button button-secondary" id="exportButton" type="button">导出 JSON</button>
                <a class="button button-secondary" href="https://github.com/ironmole666/linux-command" target="_blank" rel="noopener noreferrer">查看源码</a>
            </div>
        </header>

        <aside class="safety-note" aria-label="安全提示">
            <strong>执行前请确认参数和目标。</strong>
            删除、权限、防火墙和渗透测试命令可能产生破坏性影响；安全测试命令仅限你拥有或明确获授权的系统。
        </aside>

        <main>
            <section class="toolbar" aria-label="命令筛选">
                <div class="stats" aria-live="polite">
                    <span>总命令 <strong id="totalCount">0</strong></span>
                    <span>当前显示 <strong id="visibleCount">0</strong></span>
                    <span id="updatedAt">正在加载数据…</span>
                </div>

                <label class="search-box">
                    <span class="sr-only">搜索命令</span>
                    <span aria-hidden="true">⌕</span>
                    <input id="searchInput" type="search" placeholder="搜索命令、说明或标签…" autocomplete="off">
                </label>

                <div class="filters">
                    <div class="category-list" id="categoryList" aria-label="主分类"></div>
                    <label class="sort-control">
                        <span>排序</span>
                        <select id="sortSelect">
                            <option value="default">默认</option>
                            <option value="name">按名称</option>
                            <option value="recent">最近更新</option>
                        </select>
                    </label>
                </div>

                <div class="subcategory-list" id="subcategoryList" aria-label="子分类"></div>
            </section>

            <div class="status-message" id="statusMessage" role="status"></div>
            <section class="command-grid" id="commandGrid" aria-label="命令列表"></section>
            <nav class="pagination" id="pagination" aria-label="分页"></nav>
        </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>
</html>
